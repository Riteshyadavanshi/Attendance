services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hr_attendance
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_attendance"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hr_user:hr_pass@postgres:5432/hr_attendance
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
      FACE_SERVICE_URL: http://ai:8001
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.ai
    ports:
      - "8001:8001"

volumes:
  pgdata:
